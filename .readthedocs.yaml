# Read the Docs configuration for AgentGuard / inter-agent-guard
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# One-time: import https://github.com/nizba06/agentguard on readthedocs.io
# and set the project slug to inter-agent-guard (matches pyproject documentation URL).

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .
